services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env.staging
    ports:
      - "5010:5010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm --workspace services/api run db:deploy && node services/api/dist/server.js"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bazaarsetu_staging
      POSTGRES_USER: bazaarsetu
      POSTGRES_PASSWORD: replace-staging-db-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazaarsetu -d bazaarsetu_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_staging_data:
  redis_staging_data:
