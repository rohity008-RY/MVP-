name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  verify:
    name: Typecheck, Test, and Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bazaarsetu_test
          POSTGRES_USER: bazaarsetu
          POSTGRES_PASSWORD: bazaarsetu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bazaarsetu -d bazaarsetu_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: bazaar-setu-app

    env:
      DATABASE_URL: postgresql://bazaarsetu:bazaarsetu@localhost:5432/bazaarsetu_test
      API_BASE_URL: http://127.0.0.1:5010
      CORS_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:5010
      EXPO_PUBLIC_API_BASE_URL: http://127.0.0.1:5010

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bazaar-setu-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npm --workspace services/api run db:generate

      - name: Deploy database migrations
        run: npm --workspace services/api run db:deploy

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Run unit and integration tests
        run: npm test

      - name: Run API E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          DEMO_AUTH_ENABLED: "false"
          JWT_SECRET: ci-jwt-secret-with-more-than-thirty-two-characters
          OTP_CODE_PEPPER: ci-otp-pepper-with-more-than-thirty-two-characters
          ADMIN_BOOTSTRAP_TOKEN: ci-bootstrap-token-with-more-than-thirty-two-characters
          OTP_PROVIDER_URL: https://otp.test/send
          OTP_PROVIDER_API_KEY: ci-otp-provider-key
          RATE_LIMIT_MAX: "1000"
          RATE_LIMIT_WINDOW_MS: "60000"

      - name: Build admin web
        run: npm --workspace apps/admin-web run build
