name: Staging Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy API and Admin to Cloud Run
    runs-on: ubuntu-latest
    environment: staging

    defaults:
      run:
        working-directory: bazaar-setu-app

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'asia-south1' }}
      ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'bazaar-setu' }}
      API_SERVICE: ${{ vars.STAGING_API_SERVICE || 'bazaar-setu-api-staging' }}
      ADMIN_SERVICE: ${{ vars.STAGING_ADMIN_SERVICE || 'bazaar-setu-admin-staging' }}
      MIGRATION_JOB: ${{ vars.STAGING_MIGRATION_JOB || 'bazaar-setu-api-migrate-staging' }}
      STAGING_API_URL: ${{ vars.STAGING_API_URL }}
      STAGING_ADMIN_URL: ${{ vars.STAGING_ADMIN_URL }}
      STAGING_CORS_ORIGINS: ${{ vars.STAGING_CORS_ORIGINS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${ARTIFACT_REPOSITORY}" \
            --project "${PROJECT_ID}" \
            --location "${REGION}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${ARTIFACT_REPOSITORY}" \
            --project "${PROJECT_ID}" \
            --location "${REGION}" \
            --repository-format docker \
            --description "Bazaar Setu staging container images"

      - name: Build and push API image
        run: |
          API_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/bazaar-setu-api:${GITHUB_SHA}"
          docker build -f services/api/Dockerfile -t "${API_IMAGE}" .
          docker push "${API_IMAGE}"
          echo "API_IMAGE=${API_IMAGE}" >> "${GITHUB_ENV}"

      - name: Build and push Admin image
        run: |
          ADMIN_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/bazaar-setu-admin:${GITHUB_SHA}"
          docker build -f apps/admin-web/Dockerfile -t "${ADMIN_IMAGE}" .
          docker push "${ADMIN_IMAGE}"
          echo "ADMIN_IMAGE=${ADMIN_IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy migration job
        run: |
          gcloud run jobs deploy "${MIGRATION_JOB}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${API_IMAGE}" \
            --command npm \
            --args "--workspace,services/api,run,db:deploy" \
            --set-env-vars "NODE_ENV=production" \
            --update-secrets "DATABASE_URL=bazaar-setu-staging-database-url:latest"

      - name: Run migrations
        run: |
          gcloud run jobs execute "${MIGRATION_JOB}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --wait

      - name: Deploy API service
        run: |
          cat > /tmp/bazaar-setu-api-env.yaml <<EOF
          NODE_ENV: "production"
          API_PORT: "8080"
          API_BASE_URL: "${STAGING_API_URL}"
          CORS_ORIGINS: "${STAGING_CORS_ORIGINS}"
          REQUEST_BODY_LIMIT: "2mb"
          RATE_LIMIT_WINDOW_MS: "60000"
          RATE_LIMIT_MAX: "60"
          DEMO_AUTH_ENABLED: "false"
          ACCESS_TOKEN_TTL_SECONDS: "900"
          REFRESH_TOKEN_TTL_DAYS: "30"
          OTP_TTL_SECONDS: "300"
          OTP_MAX_ATTEMPTS: "5"
          OTP_PROVIDER_SENDER: "Bazaar Setu"
          EOF

          gcloud run deploy "${API_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${API_IMAGE}" \
            --allow-unauthenticated \
            --port 8080 \
            --env-vars-file /tmp/bazaar-setu-api-env.yaml \
            --update-secrets "DATABASE_URL=bazaar-setu-staging-database-url:latest,REDIS_URL=bazaar-setu-staging-redis-url:latest,JWT_SECRET=bazaar-setu-staging-jwt-secret:latest,OTP_PROVIDER_URL=bazaar-setu-staging-otp-provider-url:latest,OTP_PROVIDER_API_KEY=bazaar-setu-staging-otp-provider-api-key:latest,OTP_CODE_PEPPER=bazaar-setu-staging-otp-code-pepper:latest,ADMIN_BOOTSTRAP_TOKEN=bazaar-setu-staging-admin-bootstrap-token:latest,GOOGLE_MAPS_API_KEY=bazaar-setu-staging-google-maps-api-key:latest,RAZORPAY_KEY_ID=bazaar-setu-staging-razorpay-key-id:latest,RAZORPAY_KEY_SECRET=bazaar-setu-staging-razorpay-key-secret:latest"

      - name: Deploy Admin service
        run: |
          gcloud run deploy "${ADMIN_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${ADMIN_IMAGE}" \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "NODE_ENV=production,PORT=8080,NEXT_PUBLIC_API_BASE_URL=${STAGING_API_URL}"

      - name: Smoke test staging
        run: node scripts/staging-smoke.mjs
